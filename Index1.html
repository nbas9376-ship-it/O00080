<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>الصفحة الرئيسية</title>
    <style>
        body { 
            font-family: Tahoma; 
            background: #e3f2fd; 
            padding: 40px; 
            text-align: center;
        }
        .box {
            background: white; 
            padding: 30px; 
            border-radius: 10px; 
            max-width: 600px; 
            margin: auto;
            box-shadow: 0 3px 10px rgba(0,0,0,0.1);
        }
        h1 { color: #1565c0; }
        #visit-time { 
            margin: 20px 0; 
            font-size: 1.2em; 
            color: #455a64; 
        }
        a {
            display: inline-block;
            margin: 10px;
            padding: 12px 25px;
            background: #1976d2;
            color: white;
            text-decoration: none;
            border-radius: 5px;
        }
        a:hover { background: #0d47a1; }
    </style>
</head>
<body>
    <div class="box">
        <h1>مرحباً بك زائرنا العزيز 👋</h1>
        <div id="visit-time"></div>
        <p>تصفح الواجهات الأخرى:</p>
        <a href="colors.html">واجهة الألوان والبرامج</a>
        <a href="register.html">واجهة التسجيل</a>
    </div>

    <script>
        const now = new Date();
        const options = { 
            weekday: 'long', year: 'numeric', month: 'long', 
            day: 'numeric', hour: '2-digit', minute: '2-digit' 
        };
        document.getElementById('visit-time').textContent = 
            `وقت تصفحك: ${now.toLocaleDateString('ar-SA', options)}`;
    </script>
</body>
</html>
