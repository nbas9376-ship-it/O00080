<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>استمارة التسجيل</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="box">
        <h2>استمارة تسجيل في الموقع</h2>
        <form id="registerForm">
            <div class="form-group">
                <label>الاسم الكامل:</label>
                <input type="text" id="fullName">
                <div class="error-msg" id="nameError">الاسم مطلوب</div>
            </div>
            
            <div class="form-group">
                <label>البريد الإلكتروني:</label>
                <input type="email" id="email">
                <div class="error-msg" id="emailError">بريد إلكتروني غير صحيح</div>
            </div>
            
            <div class="form-group">
                <label>كلمة المرور:</label>
                <input type="password" id="password">
                <div class="error-msg" id="passError">6 خانات على الأقل</div>
            </div>

            <div class="checkbox">
                <input type="checkbox" id="terms">
                <label for="terms">أوافق على اتفاقية الاستخدام</label>
            </div>
            
            <button type="submit" id="submitBtn" disabled>تسجيل</button>
        </form>
        <a href="index.html">الرجوع للرئيسية</a>
    </div>
    <script src="script.js"></script>
</body>
</html>
