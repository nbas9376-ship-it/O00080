<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>استمارة التسجيل</title>
    <style>
        body { 
            font-family: Tahoma; 
            background: #e8f5e9; 
            padding: 40px;
        }
        .box {
            background: white; 
            padding: 30px; 
            border-radius: 10px; 
            max-width: 500px; 
            margin: auto;
        }
        h2 { color: #2e7d32; text-align: center; }
        .form-group { margin: 15px 0; }
        label { display: block; margin-bottom: 5px; font-weight: bold; }
        input[type="text"], input[type="email"], input[type="password"] {
            width: 100%;
            padding: 10px;
            border: 2px solid #ddd;
            border-radius: 5px;
            box-sizing: border-box;
        }
        input.error { border-color: #c62828; }
        .error-msg { color: #c62828; font-size: 0.9em; display: none; }
        .checkbox { margin: 20px 0; }
        button {
            width: 100%;
            padding: 12px;
            background: #43a047;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 1.1em;
            cursor: pointer;
        }
        button:disabled { background: #a5d6a7; cursor: not-allowed; }
        a { color: #2e7d32; display: block; text-align: center; margin-top: 15px; }
    </style>
</head>
<body>
    <div class="box">
        <h2>استمارة تسجيل في الموقع</h2>
        <form id="registerForm">
            <div class="form-group">
                <label>الاسم الكامل:</label>
                <input type="text" id="fullName">
                <div class="error-msg" id="nameError">الاسم مطلوب</div>
            </div>
            
            <div class="form-group">
                <label>البريد الإلكتروني:</label>
                <input type="email" id="email">
                <div class="error-msg" id="emailError">بريد إلكتروني غير صحيح</div>
            </div>
            
            <div class="form-group">
                <label>كلمة المرور:</label>
                <input type="password" id="password">
                <div class="error-msg" id="passError">6 خانات على الأقل</div>
            </div>

            <div class="checkbox">
                <input type="checkbox" id="terms">
                <label for="terms">أوافق على اتفاقية الاستخدام</label>
            </div>
            
            <button type="submit" id="submitBtn" disabled>تسجيل</button>
        </form>
        <a href="index.html">الرجوع للرئيسية</a>
    </div>

    <script>
        const terms = document.getElementById('terms');
        const submitBtn = document.getElementById('submitBtn');
        const form = document.getElementById('registerForm');

        // لا يمكن الضغط على زر التسجيل إلا بعد التأشير على اتفاقية الاستخدام
        terms.onchange = function() {
            submitBtn.disabled = !this.checked;
        };

        form.onsubmit = function(e) {
            e.preventDefault();
            let valid = true;

            // التحقق من الاسم
            const name = document.getElementById('fullName');
            if(name.value.trim() === '') {
                document.getElementById('nameError').style.display = 'block';
                name.classList.add('error');
                valid = false;
            } else {
                document.getElementById('nameError').style.display = 'none';
                name.classList.remove('error');
            }

            // التحقق من الإيميل
            const email = document.getElementById('email');
            if(!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email.value)) {
                document.getElementById('emailError').style.display = 'block';
                email.classList.add('error');
                valid = false;
            } else {
                document.getElementById('emailError').style.display = 'none';
                email.classList.remove('error');
            }

            // التحقق من الباسورد
            const pass = document.getElementById('password');
            if(pass.value.length < 6) {
                document.getElementById('passError').style.display = 'block';
                pass.classList.add('error');
                valid = false;
            } else {
                document.getElementById('passError').style.display = 'none';
                pass.classList.remove('error');
            }

            if(valid && terms.checked) {
                alert('تم التسجيل بنجاح ✅');
                form.reset();
                submitBtn.disabled = true;
            }
        };
    </script>
</body>
</html>
