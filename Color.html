<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>واجهة الألوان والبرامج</title>
    <style>
        body { 
            font-family: Tahoma; 
            background: #fff3e0; 
            padding: 40px;
            transition: 0.5s;
        }
        .box {
            background: white; 
            padding: 30px; 
            border-radius: 10px; 
            max-width: 600px; 
            margin: auto;
        }
        h2 { color: #e65100; }
        .controls { margin: 20px 0; }
        button, select, input[type="color"] {
            padding: 8px 15px;
            margin: 5px;
            border-radius: 5px;
            border: 1px solid #ccc;
        }
        button { background: #fb8c00; color: white; cursor: pointer; }
        #packageDesc { 
            margin-top: 15px; 
            padding: 10px; 
            background: #fff8e1; 
            border-radius: 5px;
        }
        a { color: #e65100; }
    </style>
</head>
<body>
    <div class="box">
        <h2>التحكم في خلفية الصفحة</h2>
        <div class="controls">
            <input type="color" id="colorPicker" value="#fff3e0">
            <button onclick="changeBg()">تغيير اللون</button>
            <button onclick="addColor()">إضافة للقائمة</button>
            <select id="colorList">
                <option>الألوان المحفوظة</option>
            </select>
        </div>

        <h2>الحزم الرياضية</h2>
        <select id="mathPackages">
            <option value="">اختر حزمة رياضية</option>
            <option value="matlab">MATLAB</option>
            <option value="mathematica">Mathematica</option>
            <option value="maple">Maple</option>
            <option value="spss">SPSS</option>
            <option value="geogebra">GeoGebra</option>
        </select>
        <div id="packageDesc"></div>
        
        <br><a href="index.html">الرجوع للرئيسية</a>
    </div>

    <script>
        function changeBg() {
            document.body.style.backgroundColor = document.getElementById('colorPicker').value;
        }
        function addColor() {
            const color = document.getElementById('colorPicker').value;
            const option = document.createElement('option');
            option.value = color;
            option.textContent = color;
            document.getElementById('colorList').appendChild(option);
        }
        document.getElementById('colorList').onchange = function() {
            if(this.value !== 'الألوان المحفوظة') 
                document.body.style.backgroundColor = this.value;
        };

        const packages = {
            matlab: 'MATLAB: للحوسبة العددية والمحاكاة',
            mathematica: 'Mathematica: للحساب الرمزي',
            maple: 'Maple: لحل المعادلات والجبر الحاسوبي',
            spss: 'SPSS: للتحليل الإحصائي',
            geogebra: 'GeoGebra: للهندسة التفاعلية'
        };
        document.getElementById('mathPackages').onchange = function() {
            document.getElementById('packageDesc').textContent = packages[this.value] || '';
        };
    </script>
</body>
</html>
